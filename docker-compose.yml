services:
  lan-clipboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lan-clipboard
    ports:
      - "3000:3000"
      - "3001:3001"
      - "4001:4001/udp"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3001
      - WS_HOST=0.0.0.0
      - DISCOVERY_ENABLED=true
      - DISCOVERY_PORT=4001
      - DISCOVERY_BROADCAST=255.255.255.255
      - DISCOVERY_INTERVAL_MS=3000
      - DISCOVERY_PEER_TTL_MS=15000
      - PEER_RECONNECT_MS=3000
      - SEEN_MESSAGE_TTL_MS=120000
      - CLUSTER_STATE_INTERVAL_MS=1500
      - PEER_SEEDS=10.50.100.13:3001,10.50.100.6:3001
    restart: unless-stopped
