services:
  quickrelay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickrelay
    ports:
      - "3000:3000" 
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3001
      - WS_HOST=0.0.0.0
      - WS_PUBLIC_PATH=/ws
      - WS_PUBLIC_URL=
      - ACCESS_PIN=changeme # Leave it empty if you don't want to use an access pin.
      - LOCAL_NODE_IP=10.50.100.13 # Update this to your local node's IP address
      - DISCOVERY_ENABLED=false
      - SEEN_MESSAGE_TTL_MS=120000
      - CLUSTER_STATE_INTERVAL_MS=1500
      - HISTORY_DB_PATH=/data/quickrelay-history.sqlite
      - MAX_HISTORY_ITEMS=50
    volumes:
      - quickrelay_data:/data
    restart: unless-stopped

volumes:
  quickrelay_data:
