services:
  lan-clipboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lan-clipboard
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3001
      - WS_HOST=0.0.0.0
    restart: unless-stopped
